<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../main.js" defer></script>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <div class="content-header">
            <h2 class="page-title">Ventas</h2>
            <p class="page-description">Revisa tus estadísticas de ventas</p>
        </div>
        <section class="stats-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"></div>
                    <div class="stat-info">
                        <h3 class="stat-number">$11,420</h3>
                        <p class="stat-label">Ingresos</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"></div>
                    <div class="stat-info">
                        <h3 class="stat-number">87</h3>
                        <p class="stat-label">Pedidos</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
