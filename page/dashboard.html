<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../main.js" defer></script>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <div class="content-header">
            <h2 class="page-title">Dashboard</h2>
            <p class="page-description">Vista general del sistema</p>
        </div>
    </main>

    <section class="stats-section">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"></div>
                <div class="stat-info">
                    <h3 class="stat-number">1,234</h3>
                    <p class="stat-label">Usuarios</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"></div>
                <div class="stat-info">
                    <h3 class="stat-number">762</h3>
                    <p class="stat-label">Productos</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"></div>
                <div class="stat-info">
                    <h3 class="stat-number">93</h3>
                    <p class="stat-label">Ventas</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"></div>
                <div class="stat-info">
                    <h3 class="stat-number">14</h3>
                    <p class="stat-label">Configuración</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
